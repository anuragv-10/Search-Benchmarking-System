<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Algorithm Benchmarking Tool</title>

  <!-- FIX 1: All CDN URLs pinned to verified versions with correct UMD paths -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <!-- FIX 2: recharts 2.8.0 from cdnjs — stable UMD, verified global 'Recharts' -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    /* FIX 3: System fonts only — no external font CDN dependency */
    :root {
      --bg: #080C14;
      --surface: #0D1321;
      --card: #111827;
      --border: #1F2D45;
      --border2: #263548;
      --text: #E8EDF5;
      --muted: #5A6B82;
      --accent: #3B82F6;
      --green: #10B981;
      --amber: #F59E0B;
      --red: #EF4444;
      --purple: #8B5CF6;
      --font-ui: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      --r: 8px;
      --r-lg: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      min-height: 100vh
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .18;
      pointer-events: none;
      z-index: 0
    }

    #root {
      position: relative;
      z-index: 1
    }

    .header {
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(8, 12, 20, .96);
      position: sticky;
      top: 0;
      z-index: 100
    }

    .logo {
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .ldot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        box-shadow: 0 0 5px var(--accent)
      }

      50% {
        box-shadow: 0 0 14px var(--accent)
      }
    }

    .tabs {
      display: flex;
      gap: 2px
    }

    .tab {
      padding: 5px 14px;
      border: 1px solid transparent;
      border-radius: var(--r);
      background: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s
    }

    .tab:hover {
      color: var(--text);
      border-color: var(--border2)
    }

    .tab.active {
      background: var(--card);
      border-color: var(--border2);
      color: var(--accent)
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 20px
    }

    .sdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted)
    }

    .sdot.ok {
      background: var(--green);
      box-shadow: 0 0 5px var(--green)
    }

    .sdot.err {
      background: var(--red)
    }

    .main {
      padding: 20px 24px;
      max-width: 1300px;
      margin: 0 auto
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      margin-bottom: 16px
    }

    .ctitle {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .ctag {
      width: 3px;
      height: 14px;
      border-radius: 2px;
      background: var(--accent);
      flex-shrink: 0
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px
    }

    .g3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px
    }

    .g4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 10px;
      margin-bottom: 4px
    }

    select,
    input[type=number] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      transition: border-color .15s
    }

    select:focus,
    input[type=number]:focus {
      border-color: var(--accent)
    }

    select option {
      background: var(--card)
    }

    input[type=range] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
      margin-top: 2px
    }

    .btn {
      padding: 7px 16px;
      border-radius: var(--r);
      border: 1px solid var(--border2);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
      font-weight: 600
    }

    .btn-p {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .btn-p:hover {
      background: #2563EB
    }

    .btn-p:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .btn-g {
      background: transparent;
      color: var(--muted)
    }

    .btn-g:hover {
      color: var(--text);
      border-color: var(--border2)
    }

    .btn-sm {
      padding: 4px 12px;
      font-size: 11px
    }

    .trow {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none
    }

    .ttrack {
      width: 34px;
      height: 19px;
      background: var(--border2);
      border-radius: 10px;
      position: relative;
      transition: background .2s;
      flex-shrink: 0
    }

    .ttrack.on {
      background: var(--accent)
    }

    .tknob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 15px;
      height: 15px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s
    }

    .ttrack.on .tknob {
      transform: translateX(15px)
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px
    }

    .sl {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 3px
    }

    .sv {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font-ui)
    }

    .ss {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px
    }

    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      border: 1px solid
    }

    .grid-viz {
      display: grid;
      gap: 1px
    }

    .gcell {
      border-radius: 1px;
      transition: background .08s
    }

    .tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px
    }

    .tbl th {
      text-align: left;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border2);
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 600
    }

    .tbl td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border)
    }

    .tbl tr:hover td {
      background: var(--surface)
    }

    .expl {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--r);
      padding: 14px;
      font-size: 12px;
      line-height: 1.8;
      white-space: pre-wrap
    }

    .ebar {
      background: rgba(239, 68, 68, .08);
      border: 1px solid rgba(239, 68, 68, .25);
      border-radius: var(--r);
      padding: 10px 14px;
      color: var(--red);
      font-size: 12px;
      margin-top: 12px
    }

    .spin {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes fu {
      from {
        opacity: 0;
        transform: translateY(5px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .fade {
      animation: fu .2s ease forwards
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: var(--surface)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px
    }

    @media(max-width:800px) {

      .g2,
      .g3,
      .g4 {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    /* global React, ReactDOM, Recharts */
    const { useState, useEffect, useRef } = React;

    // FIX 4: Cell is now in the destructure — this was the primary crash
    const {
      BarChart, Bar, XAxis, YAxis, Tooltip, Legend, CartesianGrid, ResponsiveContainer,
      RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
      Cell
    } = Recharts;

    const API = 'http://localhost:8000';
    const AC = { BFS: '#3B82F6', DFS: '#8B5CF6', UCS: '#10B981', Greedy: '#F59E0B', 'A*': '#EF4444' };
    const ALGOS = ['BFS', 'DFS', 'UCS', 'Greedy', 'A*'];
    const HEURS = ['manhattan', 'euclidean', 'chebyshev', 'zero'];

    async function api(path, method, body) {
      const o = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
      if (body) o.body = JSON.stringify(body);
      const r = await fetch(API + path, o);
      if (!r.ok) { let m = r.statusText; try { const j = await r.json(); m = j.detail || m; } catch (e) { } throw new Error(m); }
      return r.json();
    }

    function Badge({ algo }) {
      const c = AC[algo] || '#888';
      return <span className="badge" style={{ color: c, borderColor: c + '44', background: c + '18' }}>{algo}</span>;
    }
    function Spin() { return <span className="spin" />; }
    function Stat({ label, value, sub, color }) {
      return (
        <div className="stat">
          <div className="sl">{label}</div>
          <div className="sv" style={color ? { color } : {}}>{value != null ? value : '—'}</div>
          {sub && <div className="ss">{sub}</div>}
        </div>
      );
    }
    function Err({ msg }) { if (!msg) return null; return <div className="ebar">⚠ {msg}</div>; }

    function useApi() {
      const [ok, setOk] = useState(null);
      useEffect(() => {
        api('/health').then(() => setOk(true)).catch(() => setOk(false));
        const t = setInterval(() => api('/health').then(() => setOk(true)).catch(() => setOk(false)), 10000);
        return () => clearInterval(t);
      }, []);
      return ok;
    }

    // Grid visualizer
    function GridViz({ gridData, path, expanded, frontier, start, goal }) {
      if (!gridData) return <div style={{ color: 'var(--muted)', padding: '20px', textAlign: 'center' }}>Generate a maze first</div>;
      const { rows, cols, data } = gridData;
      const sz = Math.max(5, Math.min(22, Math.floor(300 / Math.max(rows, cols))));
      const pSet = new Set((path || []).map(p => p[0] + ',' + p[1]));
      const eSet = new Set((expanded || []).map(p => p[0] + ',' + p[1]));
      const fSet = new Set((frontier || []).map(p => p[0] + ',' + p[1]));
      function bg(r, c) {
        if (start && r === start[0] && c === start[1]) return 'var(--green)';
        if (goal && r === goal[0] && c === goal[1]) return 'var(--red)';
        const k = r + ',' + c;
        if (pSet.has(k)) return 'var(--accent)';
        if (fSet.has(k)) return 'var(--amber)';
        if (eSet.has(k)) return '#8B5CF6';
        if (data[r][c] === 1) return 'var(--border2)';
        return 'var(--surface)';
      }
      const cells = [];
      for (let r = 0; r < rows; r++)for (let c = 0; c < cols; c++)
        cells.push(<div key={r + ',' + c} className="gcell" style={{ width: sz, height: sz, background: bg(r, c) }} />);
      return (
        <div>
          <div className="grid-viz" style={{ gridTemplateColumns: 'repeat(' + cols + ',' + sz + 'px)', width: 'fit-content', margin: '0 auto' }}>
            {cells}
          </div>
          <div style={{ display: 'flex', gap: 10, marginTop: 8, justifyContent: 'center', flexWrap: 'wrap', fontSize: 10, color: 'var(--muted)' }}>
            {[['Start', 'var(--green)'], ['Goal', 'var(--red)'], ['Path', 'var(--accent)'],
            ['Frontier', 'var(--amber)'], ['Visited', '#8B5CF6'], ['Wall', 'var(--border2)']].map(([l, c]) => (
              <span key={l} style={{ display: 'flex', alignItems: 'center', gap: 3 }}>
                <span style={{ width: 8, height: 8, borderRadius: 2, background: c, display: 'inline-block' }} />
                {l}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // Graph visualizer
    function GraphViz({ graphData, path, expanded, frontier }) {
      if (!graphData) return <div style={{ color: 'var(--muted)', padding: '20px', textAlign: 'center' }}>Generate a graph first</div>;
      const { n_nodes, positions, edges } = graphData;
      const start = graphData.start, goal = graphData.goal;
      const W = 420, H = 280, P = 28;
      const pSet = new Set(path || []), eSet = new Set(expanded || []), fSet = new Set(frontier || []);
      function pos(id) { const p = positions[String(id)]; if (!p) return [W / 2, H / 2]; return [P + p[0] * (W - 2 * P), P + p[1] * (H - 2 * P)]; }
      function nc(id) {
        if (id === start) return 'var(--green)'; if (id === goal) return 'var(--red)';
        if (pSet.has(id)) return 'var(--accent)'; if (fSet.has(id)) return 'var(--amber)';
        if (eSet.has(id)) return '#8B5CF6'; return '#263548';
      }
      const pe = new Set(); const pa = path || [];
      for (let i = 0; i < pa.length - 1; i++)pe.add(Math.min(pa[i], pa[i + 1]) + ',' + Math.max(pa[i], pa[i + 1]));
      return (
        <svg width="100%" viewBox={'0 0 ' + W + ' ' + H} style={{ background: 'var(--surface)', borderRadius: 'var(--r)' }}>
          {(edges || []).map((e, i) => {
            const [x1, y1] = pos(e.u), [x2, y2] = pos(e.v);
            const k = Math.min(e.u, e.v) + ',' + Math.max(e.u, e.v);
            return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
              stroke={pe.has(k) ? 'var(--accent)' : 'var(--border2)'}
              strokeWidth={pe.has(k) ? 2 : 0.8} strokeOpacity={0.8} />;
          })}
          {Array.from({ length: n_nodes }, (_, id) => {
            const [x, y] = pos(id), r = (id === start || id === goal) ? 7 : 5;
            return (
              <g key={id}>
                <circle cx={x} cy={y} r={r} fill={nc(id)} fillOpacity={0.9} />
                {n_nodes <= 25 && <text x={x} y={y - 9} textAnchor="middle" fill="var(--muted)" fontSize={8}>{id}</text>}
              </g>
            );
          })}
        </svg>
      );
    }

    // ── Panel 1: Problem Designer ────────────────────────────────────────────────
    function PanelDesigner({ onProblemReady }) {
      const [env, setEnv] = useState('grid');
      const [rows, setRows] = useState(12);
      const [cols, setCols] = useState(12);
      const [den, setDen] = useState(0.3);
      const [heur, setHeur] = useState('manhattan');
      const [nodes, setNodes] = useState(20);
      const [edgeDen, setEdgeDen] = useState(0.2);
      const [seed, setSeed] = useState(42);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [preview, setPreview] = useState(null);

      async function gen() {
        setLoading(true); setError('');
        try {
          const body = env === 'grid'
            ? { rows, cols, wall_density: den, seed, heuristic: heur }
            : { n_nodes: nodes, edge_density: edgeDen, seed };
          const data = await api('/generate/' + env, 'POST', body);
          setPreview(data);
          onProblemReady({ envType: env, config: body, data });
        } catch (e) { setError(e.message); }
        setLoading(false);
      }

      return (
        <div className="card fade">
          <div className="ctitle"><div className="ctag" />[01] problem designer</div>
          <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
            {['grid', 'graph'].map(t => (
              <button key={t} className={'btn btn-sm ' + (env === t ? 'btn-p' : 'btn-g')}
                onClick={() => { setEnv(t); setPreview(null); }}>
                {t === 'grid' ? '▦ Grid Maze' : '◎ Weighted Graph'}
              </button>
            ))}
          </div>
          {env === 'grid' ? (
            <div className="g2" style={{ marginBottom: 14 }}>
              <div><label>{'Rows — ' + rows}</label><input type="range" min={5} max={50} value={rows} onChange={e => setRows(+e.target.value)} /></div>
              <div><label>{'Cols — ' + cols}</label><input type="range" min={5} max={50} value={cols} onChange={e => setCols(+e.target.value)} /></div>
              <div><label>{'Wall Density — ' + den}</label><input type="range" min={0} max={0.6} step={0.05} value={den} onChange={e => setDen(+e.target.value)} /></div>
              <div><label>Heuristic</label><select value={heur} onChange={e => setHeur(e.target.value)}>{HEURS.map(h => <option key={h}>{h}</option>)}</select></div>
              <div><label>Seed</label><input type="number" value={seed} min={0} max={999} onChange={e => setSeed(+e.target.value)} /></div>
            </div>
          ) : (
            <div className="g2" style={{ marginBottom: 14 }}>
              <div><label>{'Nodes — ' + nodes}</label><input type="range" min={5} max={150} value={nodes} onChange={e => setNodes(+e.target.value)} /></div>
              <div><label>{'Edge Density — ' + edgeDen}</label><input type="range" min={0.05} max={0.8} step={0.05} value={edgeDen} onChange={e => setEdgeDen(+e.target.value)} /></div>
              <div><label>Seed</label><input type="number" value={seed} min={0} max={999} onChange={e => setSeed(+e.target.value)} /></div>
            </div>
          )}
          <button className="btn btn-p" onClick={gen} disabled={loading}>
            {loading ? <><Spin /> Generating…</> : '⚡ Generate & Preview'}
          </button>
          <Err msg={error} />
          {preview && (
            <div style={{ marginTop: 16 }} className="fade">
              {env === 'grid'
                ? <GridViz gridData={preview} start={preview.start} goal={preview.goal} />
                : <GraphViz graphData={preview} />}
              <div style={{ marginTop: 8, fontSize: 10, color: 'var(--muted)' }}>
                {env === 'grid'
                  ? rows + '×' + cols + ' maze · start(0,0) → goal(' + String(rows - 1) + ',' + String(cols - 1) + ')'
                  : nodes + ' nodes · ' + String((preview.edges || []).length) + ' edges · seed:' + seed}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── Panel 2: Algorithm Visualizer ────────────────────────────────────────────
    function PanelVisualizer({ problem }) {
      const [algo, setAlgo] = useState('A*');
      const [heur, setHeur] = useState('manhattan');
      const [scale, setScale] = useState(1.0);
      const [speed, setSpeed] = useState(60);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');
      const [expList, setExpList] = useState([]);
      const [front, setFront] = useState([]);
      const [pathSt, setPathSt] = useState([]);
      const [playing, setPlaying] = useState(false);
      const [step, setStep] = useState(0);
      const tmr = useRef(null);
      const logRef = useRef([]);

      async function run() {
        if (!problem) { setError('Generate a problem first'); return; }
        setLoading(true); setError(''); setResult(null);
        setExpList([]); setFront([]); setPathSt([]); setStep(0); setPlaying(false);
        try {
          const data = await api('/solve', 'POST', {
            env_type: problem.envType, problem_config: problem.config,
            algo, heuristic_name: heur, heuristic_scale: scale, timeout: 10.0, record_log: true,
          });
          setResult(data);
          logRef.current = data.expansion_log || [];
          if (logRef.current.length > 0) { setPlaying(true); setStep(0); }
        } catch (e) { setError(e.message); }
        setLoading(false);
      }

      useEffect(() => {
        if (!playing) return;
        const log = logRef.current;
        if (step >= log.length) {
          setPlaying(false);
          if (result) { setPathSt(result.path || []); setFront([]); }
          return;
        }
        const delay = Math.max(8, 120 - speed);
        tmr.current = setTimeout(() => {
          const e = log[step];
          setExpList(prev => [...prev, e.expanded]);
          setFront(e.frontier || []);
          setStep(s => s + 1);
        }, delay);
        return () => clearTimeout(tmr.current);
      }, [playing, step, result, speed]);

      const total = logRef.current.length;
      const pct = total > 0 ? Math.round(step / total * 100) : 0;

      return (
        <div className="card fade">
          <div className="ctitle"><div className="ctag" />[02] algorithm visualizer</div>
          <div className="g3" style={{ marginBottom: 14 }}>
            <div><label>Algorithm</label><select value={algo} onChange={e => setAlgo(e.target.value)}>{ALGOS.map(a => <option key={a}>{a}</option>)}</select></div>
            <div><label>Heuristic</label><select value={heur} onChange={e => setHeur(e.target.value)}>{HEURS.map(h => <option key={h}>{h}</option>)}</select></div>
            <div><label>H-Scale</label>
              <select value={scale} onChange={e => setScale(+e.target.value)}>
                <option value={1.0}>1.0× admissible</option>
                <option value={1.5}>1.5× inadmissible</option>
                <option value={2.0}>2.0× inadmissible</option>
                <option value={3.0}>3.0× inadmissible</option>
              </select>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 14, flexWrap: 'wrap' }}>
            <button className="btn btn-p" onClick={run} disabled={loading || !problem}>
              {loading ? <><Spin /> Running…</> : '▶ Run ' + algo}
            </button>
            {playing && <button className="btn btn-g btn-sm" onClick={() => { setPlaying(false); clearTimeout(tmr.current); }}>⏸ Pause</button>}
            {!playing && result && step < total && <button className="btn btn-g btn-sm" onClick={() => setPlaying(true)}>▶ Resume</button>}
            <div style={{ flex: 1, minWidth: 120 }}>
              <label style={{ marginBottom: 2 }}>{'Speed — ' + speed}</label>
              <input type="range" min={0} max={110} value={speed} onChange={e => setSpeed(+e.target.value)} />
            </div>
          </div>
          {total > 0 && (
            <div style={{ height: 3, background: 'var(--border)', borderRadius: 2, marginBottom: 14 }}>
              <div style={{ height: '100%', background: 'var(--accent)', borderRadius: 2, width: pct + '%', transition: 'width .1s' }} />
            </div>
          )}
          <Err msg={error} />
          {problem ? (
            problem.envType === 'grid'
              ? <GridViz gridData={problem.data} start={problem.data && problem.data.start}
                goal={problem.data && problem.data.goal} expanded={expList} frontier={front} path={pathSt} />
              : <GraphViz graphData={problem.data} expanded={expList} frontier={front} path={pathSt} />
          ) : <div style={{ color: 'var(--muted)', padding: '20px', textAlign: 'center', fontSize: 12 }}>Generate a problem first in the Problem tab</div>}
          {result && (
            <div className="g4 fade" style={{ marginTop: 14 }}>
              <Stat label="Status" value={result.solution_found ? 'FOUND' : 'FAILED'} color={result.solution_found ? 'var(--green)' : 'var(--red)'} />
              <Stat label="Path Cost" value={result.path_cost != null ? result.path_cost.toFixed(2) : null} />
              <Stat label="Nodes Expanded" value={result.nodes_expanded} />
              <Stat label="Runtime" value={result.runtime_ms != null ? result.runtime_ms.toFixed(1) + 'ms' : null} />
            </div>
          )}
        </div>
      );
    }

    // ── Panel 3: Benchmark Comparison ────────────────────────────────────────────
    function PanelBenchmark({ problem }) {
      const [heur, setHeur] = useState('manhattan');
      const [scale, setScale] = useState(1.0);
      const [loading, setLoading] = useState(false);
      const [results, setResults] = useState(null);
      const [error, setError] = useState('');
      const [sortKey, setSortKey] = useState('nodes_expanded');

      async function run() {
        if (!problem) { setError('Generate a problem first'); return; }
        setLoading(true); setError('');
        try {
          const data = await api('/benchmark', 'POST', {
            env_type: problem.envType, problem_config: problem.config,
            heuristic_name: heur, heuristic_scale: scale, timeout: 10.0,
          });
          setResults(data.results);
        } catch (e) { setError(e.message); }
        setLoading(false);
      }

      const sorted = results ? [...results].sort((a, b) => {
        const av = a[sortKey], bv = b[sortKey];
        if (av == null) return 1; if (bv == null) return -1; return av - bv;
      }) : [];

      const cd = (results || []).map(r => ({
        algo: r.algo, nodes: r.nodes_expanded || 0,
        time: +(r.runtime_ms || 0).toFixed(2),
        cost: +(r.path_cost || 0).toFixed(2),
        memory: +(r.peak_memory_kb || 0).toFixed(1),
      }));

      function best(col) {
        if (!results) return null;
        const v = results.map(r => r[col]).filter(v => v != null);
        if (!v.length) return null;
        return Math.min(...v.map(Number));
      }

      const COLS = [['algo', 'Algo'], ['solution_found', 'Found'], ['nodes_expanded', 'Nodes'],
      ['runtime_ms', 'Time(ms)'], ['peak_memory_kb', 'Mem(KB)'], ['path_cost', 'Cost'],
      ['solution_depth', 'Depth'], ['heuristic_error', 'H-Err']];
      const SORT = new Set(['nodes_expanded', 'runtime_ms', 'peak_memory_kb', 'path_cost', 'solution_depth']);

      return (
        <div className="card fade">
          <div className="ctitle"><div className="ctag" />[03] benchmark comparison</div>
          <div style={{ display: 'flex', gap: 10, alignItems: 'flex-end', marginBottom: 14, flexWrap: 'wrap' }}>
            <div><label>Heuristic</label><select value={heur} onChange={e => setHeur(e.target.value)} style={{ width: 130 }}>{HEURS.map(h => <option key={h}>{h}</option>)}</select></div>
            <div><label>H-Scale</label>
              <select value={scale} onChange={e => setScale(+e.target.value)} style={{ width: 80 }}>
                <option value={1.0}>1.0×</option><option value={1.5}>1.5×</option>
                <option value={2.0}>2.0×</option><option value={3.0}>3.0×</option>
              </select>
            </div>
            <button className="btn btn-p" onClick={run} disabled={loading || !problem}>
              {loading ? <><Spin /> Running all…</> : '⚡ Run All Algorithms'}
            </button>
          </div>
          <Err msg={error} />
          {results && (
            <div className="fade">
              <div style={{ overflowX: 'auto', marginBottom: 16 }}>
                <table className="tbl">
                  <thead>
                    <tr>{COLS.map(([k, l]) => <th key={k} style={SORT.has(k) ? { cursor: 'pointer' } : {}} onClick={() => SORT.has(k) && setSortKey(k)}>{l}{sortKey === k ? ' ↑' : ''}</th>)}</tr>
                  </thead>
                  <tbody>
                    {sorted.map(r => (
                      <tr key={r.algo}>
                        <td><Badge algo={r.algo} /></td>
                        <td style={{ color: r.solution_found ? 'var(--green)' : 'var(--red)' }}>{r.solution_found ? '✓' : '✗'}</td>
                        {['nodes_expanded', 'runtime_ms', 'peak_memory_kb', 'path_cost', 'solution_depth', 'heuristic_error'].map(col => {
                          const val = r[col], b = best(col), isB = val != null && b != null && Math.abs(Number(val) - b) < 0.01;
                          return (
                            <td key={col} style={isB ? { color: 'var(--green)', fontWeight: 600 } : {}}>
                              {val != null ? (typeof val === 'number' ? val.toFixed(2) : String(val)) : '—'}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="g2">
                <div>
                  <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 6 }}>nodes expanded</div>
                  <ResponsiveContainer width="100%" height={150}>
                    <BarChart data={cd} margin={{ top: 4, right: 4, left: 0, bottom: 4 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
                      <XAxis dataKey="algo" tick={{ fontSize: 10, fill: 'var(--muted)' }} />
                      <YAxis tick={{ fontSize: 10, fill: 'var(--muted)' }} />
                      <Tooltip contentStyle={{ background: 'var(--card)', border: '1px solid var(--border2)', fontSize: 11 }} />
                      <Bar dataKey="nodes" radius={[3, 3, 0, 0]}>
                        {cd.map(d => <Cell key={d.algo} fill={AC[d.algo] || '#888'} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
                <div>
                  <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 6 }}>runtime (ms)</div>
                  <ResponsiveContainer width="100%" height={150}>
                    <BarChart data={cd} margin={{ top: 4, right: 4, left: 0, bottom: 4 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" />
                      <XAxis dataKey="algo" tick={{ fontSize: 10, fill: 'var(--muted)' }} />
                      <YAxis tick={{ fontSize: 10, fill: 'var(--muted)' }} />
                      <Tooltip contentStyle={{ background: 'var(--card)', border: '1px solid var(--border2)', fontSize: 11 }} />
                      <Bar dataKey="time" radius={[3, 3, 0, 0]}>
                        {cd.map(d => <Cell key={d.algo} fill={AC[d.algo] || '#888'} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              </div>
              {cd.length > 0 && (
                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 6 }}>multi-metric radar</div>
                  <ResponsiveContainer width="100%" height={200}>
                    <RadarChart data={[
                      { m: 'Speed', ...Object.fromEntries(cd.map(d => [d.algo, d.time > 0 ? +(1 / d.time * 10).toFixed(3) : 10])) },
                      { m: 'Compact', ...Object.fromEntries(cd.map(d => [d.algo, d.nodes > 0 ? +(1 / d.nodes * 100).toFixed(3) : 100])) },
                      { m: 'Memory', ...Object.fromEntries(cd.map(d => [d.algo, d.memory > 0 ? +(1 / d.memory * 100).toFixed(3) : 100])) },
                      { m: 'Quality', ...Object.fromEntries(cd.map(d => [d.algo, d.cost > 0 ? +(1 / d.cost * 10).toFixed(3) : 10])) },
                    ]}>
                      <PolarGrid stroke="var(--border)" />
                      <PolarAngleAxis dataKey="m" tick={{ fontSize: 10, fill: 'var(--muted)' }} />
                      <PolarRadiusAxis tick={false} />
                      {cd.map(d => (
                        <Radar key={d.algo} name={d.algo} dataKey={d.algo}
                          stroke={AC[d.algo]} fill={AC[d.algo]} fillOpacity={0.12} strokeWidth={1.5} />
                      ))}
                      <Legend iconType="circle" iconSize={8}
                        formatter={v => <span style={{ color: AC[v] || '#888', fontSize: 10 }}>{v}</span>} />
                    </RadarChart>
                  </ResponsiveContainer>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Panel 4: Agent Recommendation ────────────────────────────────────────────
    function PanelAgent({ problem }) {
      const [env, setEnv] = useState('grid');
      const [size, setSize] = useState(20);
      const [optimal, setOptimal] = useState(false);
      const [tLim, setTLim] = useState('');
      const [mLim, setMLim] = useState('');
      const [sw, setSw] = useState(0.4);
      const [mw, setMw] = useState(0.2);
      const [qw, setQw] = useState(0.4);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      async function rec() {
        setLoading(true); setError('');
        const tot = sw + mw + qw || 1;
        try {
          const data = await api('/agent/recommend', 'POST', {
            env_type: env, problem_size: size, optimality_required: optimal,
            time_limit_ms: tLim ? +tLim : null, memory_limit_kb: mLim ? +mLim : null,
            speed_weight: sw / tot, memory_weight: mw / tot, quality_weight: qw / tot,
            problem_config: problem ? problem.config : null, timeout: 10.0,
          });
          setResult(data);
        } catch (e) { setError(e.message); }
        setLoading(false);
      }

      const cc = result ? (AC[result.recommended_algo] || 'var(--accent)') : 'var(--accent)';
      const sd = result && result.scores
        ? Object.entries(result.scores).sort((a, b) => b[1] - a[1]).map(([a, s]) => ({ algo: a, score: +s.toFixed(3) }))
        : [];

      return (
        <div className="card fade">
          <div className="ctitle"><div className="ctag" />[04] agent recommendation</div>
          <div className="g2" style={{ marginBottom: 14 }}>
            <div><label>Environment</label>
              <select value={env} onChange={e => setEnv(e.target.value)}>
                <option value="grid">Grid Maze</option>
                <option value="graph">Weighted Graph</option>
              </select>
            </div>
            <div><label>{'Problem size — ' + size}</label><input type="range" min={5} max={200} value={size} onChange={e => setSize(+e.target.value)} /></div>
            <div><label>Time limit (ms) — optional</label><input type="number" placeholder="e.g. 50" value={tLim} onChange={e => setTLim(e.target.value)} min={1} /></div>
            <div><label>Memory limit (KB) — optional</label><input type="number" placeholder="e.g. 100" value={mLim} onChange={e => setMLim(e.target.value)} min={1} /></div>
          </div>
          <div style={{ marginBottom: 14 }}>
            <div className="trow" onClick={() => setOptimal(v => !v)}>
              <div className={'ttrack ' + (optimal ? 'on' : '')}><div className="tknob" /></div>
              <span style={{ fontSize: 12, color: optimal ? 'var(--text)' : 'var(--muted)' }}>
                Optimality required — eliminates DFS and Greedy
              </span>
            </div>
          </div>
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--r)', padding: 12, marginBottom: 14 }}>
            <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 8 }}>priority weights</div>
            <div className="g3">
              {[['Speed', sw, setSw], ['Memory', mw, setMw], ['Quality', qw, setQw]].map(([l, v, s]) => (
                <div key={l}><label>{l + ' — ' + v.toFixed(1)}</label><input type="range" min={0} max={1} step={0.1} value={v} onChange={e => s(+e.target.value)} /></div>
              ))}
            </div>
          </div>
          <button className="btn btn-p" onClick={rec} disabled={loading}>
            {loading ? <><Spin /> Analysing…</> : '🤖 Get Recommendation'}
          </button>
          <Err msg={error} />
          {result && (
            <div className="fade" style={{ marginTop: 16 }}>
              <div style={{
                background: cc + '10', border: '1px solid ' + cc + '40', borderRadius: 'var(--r-lg)',
                padding: '16px 20px', marginBottom: 14, display: 'flex', alignItems: 'center', gap: 14
              }}>
                <div style={{
                  width: 52, height: 52, borderRadius: '50%', background: cc + '20', border: '2px solid ' + cc,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 11, fontWeight: 700, color: cc, fontFamily: 'var(--font-ui)', flexShrink: 0
                }}>
                  {result.recommended_algo}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 2 }}>recommended</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: cc, fontFamily: 'var(--font-ui)' }}>{result.recommended_algo}</div>
                  {result.fallback_order && result.fallback_order.length > 0 && (
                    <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 3 }}>fallback: {result.fallback_order.join(' → ')}</div>
                  )}
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4, alignItems: 'flex-end', flexShrink: 0 }}>
                  {Object.entries(result.constraints_met || {}).map(([k, v]) => (
                    <span key={k} style={{
                      fontSize: 10, padding: '2px 8px', borderRadius: 4,
                      background: v ? 'rgba(16,185,129,.12)' : 'rgba(239,68,68,.12)',
                      color: v ? 'var(--green)' : 'var(--red)',
                      border: '1px solid ' + (v ? 'rgba(16,185,129,.3)' : 'rgba(239,68,68,.3)')
                    }}>
                      {k}: {v ? '✓' : '✗'}
                    </span>
                  ))}
                </div>
              </div>
              {sd.length > 0 && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 6 }}>candidate scores</div>
                  <ResponsiveContainer width="100%" height={90}>
                    <BarChart data={sd} layout="vertical" margin={{ top: 2, right: 10, left: 0, bottom: 2 }}>
                      <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" horizontal={false} />
                      <XAxis type="number" domain={[0, 1]} tick={{ fontSize: 9, fill: 'var(--muted)' }} />
                      <YAxis type="category" dataKey="algo" tick={{ fontSize: 10, fill: 'var(--muted)' }} width={50} />
                      <Tooltip contentStyle={{ background: 'var(--card)', border: '1px solid var(--border2)', fontSize: 11 }} />
                      <Bar dataKey="score" radius={[0, 3, 3, 0]}>
                        {sd.map(d => <Cell key={d.algo} fill={AC[d.algo] || '#888'} />)}
                      </Bar>
                    </BarChart>
                  </ResponsiveContainer>
                </div>
              )}
              <div className="expl">{result.explanation}</div>
              {result.search_result && (
                <div className="g4" style={{ marginTop: 14 }}>
                  <Stat label="Status" value={result.search_result.solution_found ? 'FOUND' : 'FAILED'} color={result.search_result.solution_found ? 'var(--green)' : 'var(--red)'} />
                  <Stat label="Path Cost" value={result.search_result.path_cost != null ? result.search_result.path_cost.toFixed(2) : null} />
                  <Stat label="Nodes Expanded" value={result.search_result.nodes_expanded} />
                  <Stat label="Runtime" value={result.search_result.runtime_ms != null ? result.search_result.runtime_ms.toFixed(1) + 'ms' : null} />
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── Root App ─────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState('designer');
      const [problem, setProblem] = useState(null);
      const apiOk = useApi();
      const TABS = [
        { id: 'designer', l: '[01] Problem' },
        { id: 'visualizer', l: '[02] Visualize' },
        { id: 'benchmark', l: '[03] Benchmark' },
        { id: 'agent', l: '[04] Agent' },
      ];
      return (
        <div>
          <header className="header">
            <div className="logo"><div className="ldot" />Search Benchmark<span style={{ color: 'var(--muted)', fontWeight: 400, fontSize: 12 }}>· DSE 3241</span></div>
            <nav className="tabs">
              {TABS.map(t => <button key={t.id} className={'tab ' + (tab === t.id ? 'active' : '')} onClick={() => setTab(t.id)}>{t.l}</button>)}
            </nav>
            <div className="status">
              <div className={'sdot ' + (apiOk === null ? '' : (apiOk ? 'ok' : 'err'))} />
              {apiOk === null ? 'connecting…' : apiOk ? 'API connected' : 'API offline'}
            </div>
          </header>
          <main className="main">
            {apiOk === false && (
              <div style={{
                background: 'rgba(239,68,68,.08)', border: '1px solid rgba(239,68,68,.25)',
                borderRadius: 'var(--r)', padding: '12px 16px', marginBottom: 16, fontSize: 12, color: 'var(--red)'
              }}>
                Backend not running. Start it: <code style={{ background: 'var(--surface)', padding: '1px 6px', borderRadius: 4 }}>python api.py</code>
              </div>
            )}
            <div style={{ display: tab === 'designer' ? 'block' : 'none' }}>
              <PanelDesigner onProblemReady={p => { setProblem(p); setTab('visualizer'); }} />
            </div>
            <div style={{ display: tab === 'visualizer' ? 'block' : 'none' }}>
              <PanelVisualizer problem={problem} />
            </div>
            <div style={{ display: tab === 'benchmark' ? 'block' : 'none' }}>
              <PanelBenchmark problem={problem} />
            </div>
            <div style={{ display: tab === 'agent' ? 'block' : 'none' }}>
              <PanelAgent problem={problem} />
            </div>
          </main>
        </div>
      );
    }

    // FIX 5: Error boundary on mount to surface any remaining issues
    try {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    } catch (e) {
      document.getElementById('root').innerHTML =
        '<div style="color:#EF4444;padding:40px;font-family:monospace;font-size:13px">' +
        '<b>Startup error:</b><br/><pre>' + e.message + '</pre></div>';
    }
  </script>
</body>

</html>
